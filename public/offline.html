<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#007BFF" />
  <title>Hors connexion — SmartTicketQR</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #f8fafc;
      color: #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .container {
      text-align: center;
      max-width: 420px;
      width: 100%;
    }

    .logo {
      margin-bottom: 2rem;
    }

    .logo svg {
      width: 80px;
      height: 80px;
      color: #007BFF;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 0.75rem;
    }

    p {
      font-size: 1rem;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .retry-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      color: #ffffff;
      background-color: #007BFF;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.15s ease;
    }

    .retry-btn:hover {
      background-color: #0056b3;
    }

    .retry-btn:active {
      transform: scale(0.97);
    }

    .retry-btn:focus-visible {
      outline: 2px solid #007BFF;
      outline-offset: 2px;
    }

    .retry-btn svg {
      width: 18px;
      height: 18px;
    }

    .footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: #94a3b8;
    }

    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- SmartTicketQR Logo (QR Code Icon) -->
    <div class="logo">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Outer rounded square -->
        <rect x="2" y="2" width="60" height="60" rx="12" fill="#007BFF" opacity="0.1"/>
        <!-- QR Code pattern -->
        <!-- Top-left finder -->
        <rect x="8" y="8" width="18" height="18" rx="3" stroke="#007BFF" stroke-width="3" fill="none"/>
        <rect x="13" y="13" width="8" height="8" rx="1" fill="#007BFF"/>
        <!-- Top-right finder -->
        <rect x="38" y="8" width="18" height="18" rx="3" stroke="#007BFF" stroke-width="3" fill="none"/>
        <rect x="43" y="13" width="8" height="8" rx="1" fill="#007BFF"/>
        <!-- Bottom-left finder -->
        <rect x="8" y="38" width="18" height="18" rx="3" stroke="#007BFF" stroke-width="3" fill="none"/>
        <rect x="13" y="43" width="8" height="8" rx="1" fill="#007BFF"/>
        <!-- Data modules -->
        <rect x="30" y="30" width="4" height="4" rx="0.5" fill="#007BFF"/>
        <rect x="38" y="30" width="4" height="4" rx="0.5" fill="#007BFF"/>
        <rect x="46" y="30" width="4" height="4" rx="0.5" fill="#007BFF"/>
        <rect x="30" y="38" width="4" height="4" rx="0.5" fill="#007BFF"/>
        <rect x="38" y="38" width="4" height="4" rx="0.5" fill="#007BFF"/>
        <rect x="30" y="46" width="4" height="4" rx="0.5" fill="#007BFF"/>
        <rect x="46" y="46" width="4" height="4" rx="0.5" fill="#007BFF"/>
      </svg>
    </div>

    <h1>Hors connexion</h1>
    <p>
      Il semble que vous n'ayez pas de connexion internet. Veuillez vérifier votre réseau et réessayer.
    </p>

    <button class="retry-btn" id="retryBtn" onclick="retryConnection()">
      <svg id="retryIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"></polyline>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
      </svg>
      <div class="spinner" id="spinner"></div>
      Réessayer
    </button>

    <div class="footer">
      SmartTicketQR &mdash; Gestion de billets simplifiée
    </div>
  </div>

  <script>
    function retryConnection() {
      const btn = document.getElementById('retryBtn');
      const icon = document.getElementById('retryIcon');
      const spinner = document.getElementById('spinner');

      icon.style.display = 'none';
      spinner.style.display = 'block';
      btn.disabled = true;

      fetch(window.location.origin + '/api/v1/health', { method: 'HEAD', cache: 'no-store' })
        .then((response) => {
          if (response.ok || response.status < 500) {
            window.location.reload();
          } else {
            showOffline();
          }
        })
        .catch(() => {
          showOffline();
        });

      function showOffline() {
        icon.style.display = 'block';
        spinner.style.display = 'none';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
